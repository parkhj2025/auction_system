<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 340" role="img">
<title>경매 절차 4단계 — 준비, 매각, 결정, 인도</title>
<desc>준비 4항목, 매각 2항목, 결정 3항목, 인도 1항목으로 구성됩니다. 사건에 따라 차이가 있지만 통상 6개월에서 1년 정도 소요됩니다.</desc>
<style>
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text { fill: #3C3489; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text { fill: #085041; }
.c-coral rect { fill: #FAECE7; stroke: #993C1D; }
.c-coral text { fill: #712B13; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text { fill: #2C2C2A; }
.th { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 14px; font-weight: 500; }
.ts { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 12px; font-weight: 400; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
@media (prefers-color-scheme: dark) {
.c-purple rect { fill: #3C3489; stroke: #CECBF6; } .c-purple text { fill: #CECBF6; }
.c-teal rect { fill: #085041; stroke: #9FE1CB; } .c-teal text { fill: #9FE1CB; }
.c-coral rect { fill: #712B13; stroke: #F5C4B3; } .c-coral text { fill: #F5C4B3; }
.c-gray rect { fill: #444441; stroke: #D3D1C7; } .c-gray text { fill: #D3D1C7; }
.arr { stroke: #B4B2A9; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g class="c-purple">
<rect x="40" y="40" width="138" height="264" rx="14" stroke-width="0.5"/>
<text class="th" x="109" y="60" text-anchor="middle" dominant-baseline="central">1. 준비</text>
</g>
<g class="c-purple"><rect x="52" y="92" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="109" y="106" text-anchor="middle" dominant-baseline="central">① 경매신청</text><text class="ts" x="109" y="122" text-anchor="middle" dominant-baseline="central">채권자가 신청</text></g>
<g class="c-purple"><rect x="52" y="144" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="109" y="158" text-anchor="middle" dominant-baseline="central">② 개시결정</text><text class="ts" x="109" y="174" text-anchor="middle" dominant-baseline="central">등기부 표시</text></g>
<g class="c-purple"><rect x="52" y="196" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="109" y="210" text-anchor="middle" dominant-baseline="central">③ 배당요구 종기</text><text class="ts" x="109" y="226" text-anchor="middle" dominant-baseline="central">신고 마감</text></g>
<g class="c-purple"><rect x="52" y="248" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="109" y="262" text-anchor="middle" dominant-baseline="central">④ 조사·평가</text><text class="ts" x="109" y="278" text-anchor="middle" dominant-baseline="central">현황·감정</text></g>
<line x1="178" y1="60" x2="194" y2="60" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="194" y="40" width="138" height="160" rx="14" stroke-width="0.5"/><text class="th" x="263" y="60" text-anchor="middle" dominant-baseline="central">2. 매각</text></g>
<g class="c-teal"><rect x="206" y="92" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="263" y="106" text-anchor="middle" dominant-baseline="central">⑤ 매각공고</text><text class="ts" x="263" y="122" text-anchor="middle" dominant-baseline="central">14일 전 게시</text></g>
<g class="c-teal"><rect x="206" y="144" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="263" y="158" text-anchor="middle" dominant-baseline="central">⑥ 매각기일</text><text class="ts" x="263" y="174" text-anchor="middle" dominant-baseline="central">법원 입찰</text></g>
<line x1="332" y1="60" x2="348" y2="60" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="348" y="40" width="138" height="212" rx="14" stroke-width="0.5"/><text class="th" x="417" y="60" text-anchor="middle" dominant-baseline="central">3. 결정</text></g>
<g class="c-coral"><rect x="360" y="92" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="417" y="106" text-anchor="middle" dominant-baseline="central">⑦ 매각허가결정</text><text class="ts" x="417" y="122" text-anchor="middle" dominant-baseline="central">1주 이내 선고</text></g>
<g class="c-coral"><rect x="360" y="144" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="417" y="158" text-anchor="middle" dominant-baseline="central">⑧ 확정</text><text class="ts" x="417" y="174" text-anchor="middle" dominant-baseline="central">항고 기간 경과</text></g>
<g class="c-coral"><rect x="360" y="196" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="417" y="210" text-anchor="middle" dominant-baseline="central">⑨ 대금지급</text><text class="ts" x="417" y="226" text-anchor="middle" dominant-baseline="central">통상 1개월 이내</text></g>
<line x1="486" y1="60" x2="502" y2="60" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="502" y="40" width="138" height="108" rx="14" stroke-width="0.5"/><text class="th" x="571" y="60" text-anchor="middle" dominant-baseline="central">4. 인도</text></g>
<g class="c-gray"><rect x="514" y="92" width="114" height="44" rx="6" stroke-width="1"/><text class="ts" x="571" y="106" text-anchor="middle" dominant-baseline="central">⑩ 소유권·인도</text><text class="ts" x="571" y="122" text-anchor="middle" dominant-baseline="central">잔금 즉시 취득</text></g>
</svg>

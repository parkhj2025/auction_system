<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 280" role="img">
<title>강제경매와 임의경매의 신청 근거 비교</title>
<desc>강제경매는 집행권원으로, 임의경매는 담보권으로 신청합니다. 이후 매각 절차는 동일합니다.</desc>
<style>
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text { fill: #3C3489; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text { fill: #085041; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text { fill: #2C2C2A; }
.th { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 14px; font-weight: 500; }
.ts { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 12px; font-weight: 400; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
@media (prefers-color-scheme: dark) {
.c-purple rect { fill: #3C3489; stroke: #CECBF6; } .c-purple text { fill: #CECBF6; }
.c-teal rect { fill: #085041; stroke: #9FE1CB; } .c-teal text { fill: #9FE1CB; }
.c-gray rect { fill: #444441; stroke: #D3D1C7; } .c-gray text { fill: #D3D1C7; }
.arr { stroke: #B4B2A9; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g class="c-purple">
<rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="62" text-anchor="middle" dominant-baseline="central">강제경매</text>
<text class="ts" x="110" y="80" text-anchor="middle" dominant-baseline="central">판결문·공정증서</text>
</g>
<line x1="180" y1="68" x2="240" y2="68" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="240" y="40" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="320" y="62" text-anchor="middle" dominant-baseline="central">집행권원으로 신청</text>
<text class="ts" x="320" y="80" text-anchor="middle" dominant-baseline="central">민사집행법</text>
</g>
<path d="M400 68 L420 68 L440 124" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="40" y="184" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="206" text-anchor="middle" dominant-baseline="central">임의경매</text>
<text class="ts" x="110" y="224" text-anchor="middle" dominant-baseline="central">근저당·전세권 등</text>
</g>
<line x1="180" y1="212" x2="240" y2="212" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="240" y="184" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="320" y="206" text-anchor="middle" dominant-baseline="central">담보권으로 신청</text>
<text class="ts" x="320" y="224" text-anchor="middle" dominant-baseline="central">민사집행법</text>
</g>
<path d="M400 212 L420 212 L440 156" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="460" y="112" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="134" text-anchor="middle" dominant-baseline="central">동일한 매각 절차</text>
<text class="ts" x="550" y="152" text-anchor="middle" dominant-baseline="central">입찰·낙찰·소유권 취득</text>
</g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 380" role="img">
<title>경매의 다섯 등장인물 관계도</title>
<desc>집행법원이 절차를 지휘하고, 집행관이 현장을 진행합니다. 채권자, 부동산, 매수인이 가로축에 배치되어 신청과 소유권 이전 관계를 이룹니다.</desc>
<style>
.c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
.c-blue text { fill: #0C447C; }
.c-coral rect { fill: #FAECE7; stroke: #993C1D; }
.c-coral text { fill: #712B13; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text { fill: #085041; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text { fill: #2C2C2A; }
.th { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 14px; font-weight: 500; }
.ts { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 12px; font-weight: 400; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
.label { font-family: 'Noto Sans KR', system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
@media (prefers-color-scheme: dark) {
.c-blue rect { fill: #0C447C; stroke: #B5D4F4; } .c-blue text { fill: #B5D4F4; }
.c-coral rect { fill: #712B13; stroke: #F5C4B3; } .c-coral text { fill: #F5C4B3; }
.c-teal rect { fill: #085041; stroke: #9FE1CB; } .c-teal text { fill: #9FE1CB; }
.c-gray rect { fill: #444441; stroke: #D3D1C7; } .c-gray text { fill: #D3D1C7; }
.arr { stroke: #B4B2A9; }
.label { fill: #B4B2A9; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g class="c-blue">
<rect x="240" y="20" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">집행법원</text>
<text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">절차 지휘·결정</text>
</g>
<line x1="340" y1="76" x2="340" y2="148" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral">
<rect x="40" y="170" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="192" text-anchor="middle" dominant-baseline="central">채권자</text>
<text class="ts" x="110" y="210" text-anchor="middle" dominant-baseline="central">돈을 받을 사람</text>
</g>
<text class="label" x="210" y="190" text-anchor="middle">신청</text>
<line x1="180" y1="198" x2="240" y2="198" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="240" y="160" width="200" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="184" text-anchor="middle" dominant-baseline="central">부동산</text>
<text class="ts" x="340" y="208" text-anchor="middle" dominant-baseline="central">채무자가 소유한</text>
<text class="ts" x="340" y="224" text-anchor="middle" dominant-baseline="central">매각 대상</text>
</g>
<text class="label" x="470" y="190" text-anchor="middle">소유권</text>
<line x1="440" y1="198" x2="500" y2="198" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="500" y="170" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="192" text-anchor="middle" dominant-baseline="central">매수인</text>
<text class="ts" x="570" y="210" text-anchor="middle" dominant-baseline="central">입찰 참여자</text>
</g>
<line x1="340" y1="304" x2="340" y2="240" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="240" y="304" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="326" text-anchor="middle" dominant-baseline="central">집행관</text>
<text class="ts" x="340" y="344" text-anchor="middle" dominant-baseline="central">현장·입찰 진행</text>
</g>
</svg>

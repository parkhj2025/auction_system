name: Crawler API Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Show runner external IP
        run: curl -s https://ifconfig.me && echo ""

      - name: Session init
        run: |
          echo "=== Session Init ==="
          COOKIES=$(curl -s -D - -o /dev/null \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36" \
            "https://www.courtauction.go.kr/pgj/index.on?w2xPath=/pgj/ui/pgj100/PGJ151F00.xml" \
            | grep -i "^set-cookie:" | sed 's/set-cookie: //i' | cut -d';' -f1)

          COOKIE_STR=""
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r')
            val=$(echo "$line" | cut -d'=' -f2-)
            if [ -n "$val" ]; then
              if [ -n "$COOKIE_STR" ]; then
                COOKIE_STR="$COOKIE_STR; $line"
              else
                COOKIE_STR="$line"
              fi
            fi
          done <<< "$COOKIES"
          echo "Cookies: $COOKIE_STR"
          echo "$COOKIE_STR" > /tmp/probe_cookies.txt
          sleep 2

      - name: "Test 1: Search API (searchControllerMain.on)"
        run: |
          COOKIE_STR=$(cat /tmp/probe_cookies.txt)
          TODAY=$(date +%Y%m%d)
          END=$(date -d "+14 days" +%Y%m%d)

          echo "=== Search API Single Call ==="
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X POST "https://www.courtauction.go.kr/pgj/pgjsearch/searchControllerMain.on" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36" \
            -H "Content-Type: application/json;charset=UTF-8" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Origin: https://www.courtauction.go.kr" \
            -H "Referer: https://www.courtauction.go.kr/pgj/index.on?w2xPath=/pgj/ui/pgj100/PGJ151F00.xml" \
            -H "SC-Userid: NONUSER" \
            -H "SC-Pgmid: PGJ151F01" \
            -H "submissionid: mf_wfm_mainFrame_sbm_selectGdsDtlSrch" \
            -H "Sec-Fetch-Dest: empty" \
            -H "Sec-Fetch-Mode: cors" \
            -H "Sec-Fetch-Site: same-origin" \
            -H "Cookie: $COOKIE_STR" \
            -d '{
              "dma_pageInfo":{"pageNo":1,"pageSize":1,"totalYn":"Y","bfPageNo":"","startRowNo":"","totalCnt":"","groupTotalCount":""},
              "dma_srchGdsDtlSrchInfo":{
                "cortOfcCd":"B000240","bidBgngYmd":"'"$TODAY"'","bidEndYmd":"'"$END"'",
                "bidDvsCd":"000331","mvprpRletDvsCd":"00031R","cortAuctnSrchCondCd":"0004601",
                "cortStDvs":"1","statNum":1,"notifyLoc":"off","pgmId":"PGJ151F01",
                "csNo":"","rletDspslSpcCondCd":"","rprsAdongSdCd":"","rprsAdongSggCd":"","rprsAdongEmdCd":"",
                "rdnmSdCd":"","rdnmSggCd":"","rdnmNo":"",
                "mvprpDspslPlcAdongSdCd":"","mvprpDspslPlcAdongSggCd":"","mvprpDspslPlcAdongEmdCd":"",
                "rdDspslPlcAdongSdCd":"","rdDspslPlcAdongSggCd":"","rdDspslPlcAdongEmdCd":"",
                "jdbnCd":"","execrOfcDvsCd":"",
                "lclDspslGdsLstUsgCd":"","mclDspslGdsLstUsgCd":"","sclDspslGdsLstUsgCd":"",
                "cortAuctnMbrsId":"","aeeEvlAmtMin":"","aeeEvlAmtMax":"",
                "lwsDspslPrcRateMin":"","lwsDspslPrcRateMax":"","flbdNcntMin":"","flbdNcntMax":"",
                "objctArDtsMin":"","objctArDtsMax":"","mvprpArtclKndCd":"","mvprpArtclNm":"",
                "mvprpAtchmPlcTypCd":"","lafjOrderBy":"",
                "dspslDxdyYmd":"","fstDspslHm":"","scndDspslHm":"","thrdDspslHm":"","fothDspslHm":"",
                "dspslPlcNm":"","lwsDspslPrcMin":"","lwsDspslPrcMax":"","grbxTypCd":"","gdsVendNm":"",
                "fuelKndCd":"","carMdyrMax":"","carMdyrMin":"","carMdlNm":"","sideDvsCd":""
              }
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_CODE://')
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Body (first 300): $(echo "$BODY" | head -c 300)"
          echo "$HTTP_CODE" > /tmp/search_result.txt

      - name: "Test 2: Detail+Photo API (selectAuctnCsSrchRslt.on)"
        run: |
          COOKIE_STR=$(cat /tmp/probe_cookies.txt)

          echo "=== Detail+Photo API Call ==="
          echo "Endpoint: /pgj/pgj15B/selectAuctnCsSrchRslt.on"
          echo "csNo: 2022타경519532 / cortOfcCd: B000240 / dspslGdsSeq: 1"

          sleep 2

          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X POST "https://www.courtauction.go.kr/pgj/pgj15B/selectAuctnCsSrchRslt.on" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36" \
            -H "Content-Type: application/json;charset=UTF-8" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Origin: https://www.courtauction.go.kr" \
            -H "Referer: https://www.courtauction.go.kr/pgj/index.on?w2xPath=/pgj/ui/pgj100/PGJ151F00.xml" \
            -H "SC-Userid: NONUSER" \
            -H "SC-Pgmid: PGJ15BM01" \
            -H "submissionid: mf_wfm_mainFrame_sbm_selectGdsDtlSrchDtlInfo" \
            -H "Sec-Fetch-Dest: empty" \
            -H "Sec-Fetch-Mode: cors" \
            -H "Sec-Fetch-Site: same-origin" \
            -H "Cookie: $COOKIE_STR" \
            -d '{"dma_srchGdsDtlSrch":{"csNo":"2022타경519532","cortOfcCd":"B000240","dspslGdsSeq":"1","pgmId":"PGJ15BM01","srchInfo":{}}}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_CODE://')
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"

          # Check for csPicLst in response
          if echo "$BODY" | grep -q "csPicLst"; then
            PIC_COUNT=$(echo "$BODY" | grep -o '"picFile"' | wc -l)
            echo "csPicLst found: $PIC_COUNT photos"
          else
            echo "Body (first 300): $(echo "$BODY" | head -c 300)"
          fi

          # Check for csBaseInfo
          if echo "$BODY" | grep -q "userCsNo"; then
            echo "csBaseInfo found (case data present)"
          fi

          echo "$HTTP_CODE" > /tmp/detail_result.txt

      - name: Summary
        if: always()
        run: |
          SEARCH=$(cat /tmp/search_result.txt 2>/dev/null || echo "N/A")
          DETAIL=$(cat /tmp/detail_result.txt 2>/dev/null || echo "N/A")

          echo ""
          echo "=========================================="
          echo "  Probe Results Summary"
          echo "=========================================="
          echo "  Search API (searchControllerMain.on): HTTP $SEARCH"
          echo "  Detail API (selectAuctnCsSrchRslt.on): HTTP $DETAIL"
          echo "=========================================="
          echo ""

          if [ "$SEARCH" = "200" ] && [ "$DETAIL" = "200" ]; then
            echo "VERDICT: Both APIs accessible from GitHub Actions runner."
            echo "ACTION: Proceed with cron crawler deployment."
          elif [ "$SEARCH" != "200" ] && [ "$DETAIL" = "200" ]; then
            echo "VERDICT: Search API blocked, Detail API accessible."
            echo "ACTION: Crawler needs redesign - use detail API for individual case refresh,"
            echo "        or find alternative for bulk listing collection."
          elif [ "$SEARCH" = "200" ] && [ "$DETAIL" != "200" ]; then
            echo "VERDICT: Search API accessible, Detail API blocked."
            echo "ACTION: Crawler can collect text data. Photo fetcher needs alternative path."
          else
            echo "VERDICT: Both APIs blocked from this runner IP."
            echo "ACTION: Azure/GitHub IP range is blocked. Need self-hosted runner or alternative."
          fi
